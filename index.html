<!DOCTYPE html>
<html class="dark" lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otomind Stok Yönetimi</title>
  <meta name="description" content="Otomind Lüks Oto Minder ve Kılıfları — Stok ve Sipariş Yönetim Sistemi" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "var(--color-primary)",
            "primary-hover": "var(--color-primary-hover)",
            "background-dark": "var(--color-bg-dark)",
            "surface-dark": "var(--color-surface-dark)",
            "surface-hover": "var(--color-surface-hover)",
          },
          fontFamily: { sans: ["Inter", "sans-serif"] },
        },
      },
    };
  </script>
  <style>
    :root {
      /* LIGHT MODE VARIABLES */
      --color-primary: #dc2626; /* Red */
      --color-primary-hover: #b91c1c;
      --color-bg: #f8fafc;
      --color-surface: #ffffff;
      --color-surface-hover: #f1f5f9;
      --color-text-main: #0f172a;
      --color-text-muted: #64748b;
      --color-text-muted-light: #475569;
      --color-text-muted-dark: #94a3b8;
      --color-border-divider: rgba(0, 0, 0, 0.1);
      --color-border-divider-light: rgba(0, 0, 0, 0.05);
      --color-overlay: rgba(0, 0, 0, 0.05);
      --color-overlay-hover: rgba(0, 0, 0, 0.1);
      --color-overlay-light: rgba(0, 0, 0, 0.02);
      --color-overlay-border: rgba(0, 0, 0, 0.04);
      --color-accent: #f87171;
      --glass-bg: rgba(255, 255, 255, 0.7);
    }

    .dark {
      /* DARK MODE VARIABLES */
      --color-primary: #dc2626; /* Kept red for dark mode too */
      --color-primary-hover: #b91c1c;
      --color-bg: #0A1628;
      --color-surface: #142038;
      --color-surface-hover: #1E3050;
      --color-text-main: #ffffff;
      --color-text-muted: #94a3b8; /* slate-400 */
      --color-text-muted-light: #cbd5e1; /* slate-300 */
      --color-text-muted-dark: #64748b; /* slate-500 */
      --color-border-divider: rgba(255, 255, 255, 0.1);
      --color-border-divider-light: rgba(255, 255, 255, 0.05);
      --color-overlay: rgba(255, 255, 255, 0.05);
      --color-overlay-hover: rgba(255, 255, 255, 0.1);
      --color-overlay-light: rgba(255, 255, 255, 0.03);
      --color-overlay-border: rgba(255, 255, 255, 0.04);
      --color-accent: #f87171;
      --glass-bg: rgba(20, 32, 56, 0.7);
    }

    .bg-primary { background-color: var(--color-primary) !important; }
    .bg-primary-hover { background-color: var(--color-primary-hover) !important; }
    .text-primary { color: var(--color-primary) !important; }
    .text-primary-light { color: var(--color-accent) !important; }
    .border-primary { border-color: var(--color-primary) !important; }
    .ring-primary { --tw-ring-color: var(--color-primary) !important; }
    
    .bg-background { background-color: var(--color-bg) !important; }
    .bg-surface { background-color: var(--color-surface) !important; }
    .bg-surface-hover { background-color: var(--color-surface-hover) !important; }
    
    .text-main { color: var(--color-text-main) !important; }
    .text-muted { color: var(--color-text-muted) !important; }
    .text-muted-light { color: var(--color-text-muted-light) !important; }
    .text-muted-dark { color: var(--color-text-muted-dark) !important; }
    
    .border-divider { border-color: var(--color-border-divider) !important; }
    .border-divider-light { border-color: var(--color-border-divider-light) !important; }
    
    .bg-overlay { background-color: var(--color-overlay) !important; }
    .bg-overlay-hover { background-color: var(--color-overlay-hover) !important; }
    .bg-overlay-light { background-color: var(--color-overlay-light) !important; }
    .bg-overlay-border { background-color: var(--color-overlay-border) !important; }
    .hover\:bg-overlay-border-light:hover { background-color: var(--color-overlay-light) !important; }

    .bg-primary\/10 { background-color: color-mix(in srgb, var(--color-primary) 10%, transparent) !important; }
    .bg-primary\/20 { background-color: color-mix(in srgb, var(--color-primary) 20%, transparent) !important; }
    .text-primary\/70 { color: color-mix(in srgb, var(--color-primary) 70%, transparent) !important; }
    .hover\:bg-primary\/90:hover { background-color: color-mix(in srgb, var(--color-primary) 90%, transparent) !important; }
    .border-primary\/30 { border-color: color-mix(in srgb, var(--color-primary) 30%, transparent) !important; }
    .border-slate-800 { border-color: rgba(255, 255, 255, 0.07) !important; }
    .border-slate-700 { border-color: color-mix(in srgb, var(--color-surface-hover) 60%, transparent) !important; }

    html, body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      max-width: 100vw;
    }
    #root, #root>div, #root>div>main {
      overflow-x: hidden;
      max-width: 100vw;
    }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--color-border-divider-light);
    }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.3); border-radius: 3px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(100, 116, 139, 0.5); }

    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-page-enter { animation: pageEnter 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

    /* GLOBAL MODAL CLASSES */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background-color: transparent !important;
      backdrop-filter: none !important;
      pointer-events: auto !important;
      display: flex !important;
      align-items: flex-end !important;
      justify-content: center !important;
      padding: 0 !important;
      overflow: hidden !important;
    }

    .modal-container {
      position: relative !important;
      width: 100% !important;
      max-width: 900px !important;
      max-height: 90vh !important;
      display: flex !important;
      flex-direction: column !important;
      z-index: 51 !important;
      overflow: hidden !important;
      background-color: var(--color-surface) !important;
      border: 1px solid var(--color-border-divider) !important;
      border-radius: 1.5rem 1.5rem 0 0 !important;
      box-shadow: 0 -10px 40px -5px rgba(0, 0, 0, 0.4) !important;
      animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
    }

    .modal-container-sm {
      position: relative !important;
      width: 100% !important;
      max-width: 28rem !important;
      max-height: 90vh !important;
      display: flex !important;
      flex-direction: column !important;
      z-index: 51 !important;
      overflow: hidden !important;
      background-color: var(--color-surface) !important;
      border: 1px solid var(--color-border-divider) !important;
      border-radius: 1.5rem 1.5rem 0 0 !important;
      box-shadow: 0 -10px 40px -5px rgba(0, 0, 0, 0.4) !important;
      animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0.5; }
      to { transform: translateY(0); opacity: 1; }
    }

    .btn-press { transition: transform 0.15s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.15s ease; }
    .btn-press:active { transform: scale(0.96); }
    .menu-item { transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1); position: relative; }
    .menu-item:hover { transform: translateX(4px); }
    .menu-item:active { transform: translateX(2px) scale(0.98); }
    .menu-indicator { transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1); }

    *, *::before, *::after {
      transition: background-color 0.35s ease, border-color 0.35s ease, color 0.2s ease, box-shadow 0.3s ease;
    }
    input:focus, textarea:focus, select:focus, input, textarea, select {
      transition: border-color 0.2s ease, box-shadow 0.2s ease !important;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb, [class*="animate-spin"], [class*="animate-pulse"] {
      transition: none !important;
    }
    .card-hover { transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3); }
    .icon-bounce { transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1); }
    .icon-bounce:hover { transform: scale(1.15); }
    .icon-bounce:active { transform: scale(0.9); }

    /* MOBILE NATIVE OPTIMIZATIONS (Touch targets & Fullscreen Modals) */
    @media (max-width: 639px) {
      .modal-container, .modal-container-sm {
        height: 100dvh !important;
        max-height: 100dvh !important;
        border-radius: 0 !important;
        border: none !important;
      }
      .input-field, .btn-press, select, button {
        min-height: 44px;
      }
    }
  </style>
</head>

<body class="bg-background text-main min-h-screen overflow-hidden transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
